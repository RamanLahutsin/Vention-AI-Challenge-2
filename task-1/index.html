<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <h1 class="page-title">Leaderboard</h1>
        <p class="page-subtitle">Top performers based on contributions and activity</p>
      </header>

      <section class="filters-card" aria-label="Leaderboard filters">
        <label id="year-filter-label" class="visually-hidden" for="year-filter-trigger">Filter by year</label>
        <div class="filter-select custom-dropdown" data-filter="year" data-state-key="year">
          <button
            id="year-filter-trigger"
            type="button"
            class="filter-trigger"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-labelledby="year-filter-label year-filter-value"
          >
            <span id="year-filter-value" class="filter-trigger-value">All Years</span>
            <svg class="filter-chevron" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <polyline points="6 9 12 15 18 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></polyline>
            </svg>
          </button>
          <div class="filter-options" role="listbox" aria-labelledby="year-filter-label"></div>
        </div>

        <label id="quarter-filter-label" class="visually-hidden" for="quarter-filter-trigger">Filter by quarter</label>
        <div class="filter-select custom-dropdown" data-filter="quarter" data-state-key="quarter">
          <button
            id="quarter-filter-trigger"
            type="button"
            class="filter-trigger"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-labelledby="quarter-filter-label quarter-filter-value"
          >
            <span id="quarter-filter-value" class="filter-trigger-value">All Quarters</span>
            <svg class="filter-chevron" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <polyline points="6 9 12 15 18 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></polyline>
            </svg>
          </button>
          <div class="filter-options" role="listbox" aria-labelledby="quarter-filter-label"></div>
        </div>

        <label id="category-filter-label" class="visually-hidden" for="category-filter-trigger">Filter by category</label>
        <div class="filter-select custom-dropdown" data-filter="category" data-state-key="category">
          <button
            id="category-filter-trigger"
            type="button"
            class="filter-trigger"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-labelledby="category-filter-label category-filter-value"
          >
            <span id="category-filter-value" class="filter-trigger-value">All Categories</span>
            <svg class="filter-chevron" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <polyline points="6 9 12 15 18 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></polyline>
            </svg>
          </button>
          <div class="filter-options" role="listbox" aria-labelledby="category-filter-label"></div>
        </div>

        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"></circle>
            <line x1="16.65" y1="16.65" x2="21" y2="21" stroke="currentColor" stroke-width="2"></line>
          </svg>
          <label class="visually-hidden" for="employee-search">Search employee</label>
          <input id="employee-search" type="search" placeholder="Search employee..." autocomplete="off" />
        </div>
      </section>

      <section id="podium" class="podium-section" aria-label="Top 3 performers"></section>
      <section id="leaderboard-list" class="leaderboard-list" aria-label="Leaderboard entries"></section>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
